<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="user-bar" class="hidden">
    <button id="microsoft-login-btn">Sign in with Microsoft</button>
    <span id="user-email"></span>
    <button id="logout-btn" class="hidden">Log out</button>
  </div>

  <div id="app" class="hidden">
    <h1>Portfolio</h1>

    <section id="allocation">
      <h2>Asset Allocation</h2>
      <div id="allocation-chart"></div>
    </section>

    <section id="performance">
      <h2>Performance</h2>
      <div id="performance-chart"></div>
    </section>

    <section id="holdings">
      <h2>Holdings</h2>
      <table id="holdings-table">
        <thead>
          <tr>
            <th>Symbol</th>
            <th>Name</th>
            <th>Allocation %</th>
            <th>Sector</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="admin-panel" class="hidden">
      <h2>Admin</h2>
      <button id="import-btn">Import Portfolio</button>
      <div id="import-area" class="hidden">
        <textarea id="csv-input" placeholder="Paste CSV data here..."></textarea>
        <button id="csv-submit">Submit</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@4.12.0/lib/msal-browser.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
