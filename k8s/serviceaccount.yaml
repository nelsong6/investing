# ServiceAccount for the investing pod. Annotated with the Azure client ID
# of infra-shared-identity — via the federated credential bound to
# system:serviceaccount:investing:infra-shared (created in infra-bootstrap's
# tofu), pods that use this SA assume the managed identity and inherit its
# roles (Cosmos, App Config, Key Vault, Storage).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-shared
  namespace: investing
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: 44b0ff37-b886-4101-ab19-23388ead9c0b
