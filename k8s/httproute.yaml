# HTTPRoute for investing.romaine.life. Dual parentRef:
#   - XListenerSet (app-owned HTTPS listener on 443, with cert)
#   - Gateway main (platform HTTP listener on 80 — also what ExternalDNS
#     reads to create the A record; ExternalDNS v0.20 doesn't yet follow
#     XListenerSet parents, tracked by external-dns#5694)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: investing
  namespace: investing
spec:
  hostnames:
    - investing.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: investing
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: investing
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
